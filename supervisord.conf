[supervisord]
nodaemon=true ; Запускать supervisord в foreground, обязательно для Docker
logfile=/dev/null ; Не пишем общий лог супервизора (логи процессов будут отдельно)
logfile_maxbytes=0
pidfile=/var/run/supervisord.pid

[program:tailscaled]
command=/usr/sbin/tailscaled --state=mem: --tun=userspace-networking
autostart=true
autorestart=true
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:tailscale-auth]
; Этот скрипт просто авторизует узел и завершается
command=/usr/local/bin/ts-auth.sh
autostart=true
autorestart=false ; Нам нужно запустить это только один раз
priority=20       ; Запускается после tailscaled
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:darkhttpd]
command=/usr/bin/darkhttpd /www --port 8080 ; Команда запуска darkhttpd
autostart=true
autorestart=true
priority=100            ; Запускать после основных служб
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:microsocks]
command=/usr/local/bin/microsocks -p 1080 ; Команда запуска microsocks (БЕЗ AUTH)
; Если нужна аутентификация, используйте переменные окружения:
; command=bash -c "/usr/local/bin/microsocks -p 1080 -u \"${PROXY_USER}\" -P \"${PROXY_PASSWORD}\""
; environment=PROXY_USER="%(ENV_PROXY_USER)s",PROXY_PASSWORD="%(ENV_PROXY_PASSWORD)s"
autostart=true
autorestart=true
priority=90             ; Запускать после tailscaled, но до httpd
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0