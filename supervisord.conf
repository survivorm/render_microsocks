[supervisord]
nodaemon=true ; Запускать supervisord в foreground, обязательно для Docker
logfile=/dev/null ; Не пишем общий лог супервизора (логи процессов будут отдельно)
logfile_maxbytes=0
pidfile=/var/run/supervisord.pid

[program:tailscaled]
command=/usr/sbin/tailscaled --state=mem: --tun=userspace-networking
autostart=true
autorestart=true
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:tailscale-auth]
command=/usr/local/bin/ts-auth.sh
autostart=true
autorestart=false
priority=20
; Добавляем проброс переменных окружения:
environment=TAILSCALE_AUTHKEY="%(ENV_TAILSCALE_AUTHKEY)s"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:darkhttpd]
command=/usr/bin/darkhttpd /www --port 8080
autostart=true
autorestart=true
priority=1
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:microsocks]
command=/usr/local/bin/microsocks -p 1080
; Если нужна аутентификация, используйте переменные окружения:
; command=bash -c "/usr/local/bin/microsocks -p 1080 -u \"${PROXY_USER}\" -P \"${PROXY_PASSWORD}\""
; environment=PROXY_USER="%(ENV_PROXY_USER)s",PROXY_PASSWORD="%(ENV_PROXY_PASSWORD)s"
autostart=true
autorestart=true
priority=90             ; Запускать после tailscaled, но до httpd
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0